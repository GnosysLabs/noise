name: Noise
options:
  bundleIdPrefix: xyz.gnosyslabs
  deploymentTarget:
    macOS: "14.0"
settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: minimal
targets:
  Noise:
    type: application
    platform: macOS
    sources:
      - path: Noise
    preBuildScripts:
      - name: Build shared Noise core
        basedOnDependencyAnalysis: false
        script: |
          set -euo pipefail
          cd "$SRCROOT/../.."
          cargo build -p noise-ffi
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: xyz.gnosyslabs.noise
        PRODUCT_NAME: noise
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: noise
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.social-networking
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        SWIFT_OBJC_BRIDGING_HEADER: "$(SRCROOT)/Noise/Bridge/Noise-Bridging-Header.h"
        LIBRARY_SEARCH_PATHS: "$(SRCROOT)/../../target/debug"
        OTHER_LDFLAGS: "$(inherited) -lnoise_ffi -framework Security -framework SystemConfiguration"
        CODE_SIGN_IDENTITY: "-"
        ENABLE_HARDENED_RUNTIME: YES
